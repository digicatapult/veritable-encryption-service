name: Test (NPM)
on:
  push:
    branches-ignore: ['main']
jobs:
  static-checks-npm:
    uses: digicatapult/shared-workflows/.github/workflows/static-checks-npm.yml@main
    permissions:
      security-events: write
    with:
      matrix_commands: '["lint", "depcheck", "check"]'
  tests:
    uses: digicatapult/shared-workflows/.github/workflows/tests-npm.yml@main
    permissions:
      pull-requests: write
    with:
      npm_build_command: >
        sudo apt-get update &&
        sudo apt-get install -y libnss3-tools mkcert &&
        mkcert -install &&
        mkcert veritable-cloudagent-alice localhost &&
        mkcert veritable-cloudagent-bob localhost &&
        echo "NODE_EXTRA_CA_CERTS=$(mkcert -CAROOT)/rootCA.pem" >> $GITHUB_ENV
      pre_test_command: 'npm run tsoa:build && npm run db:migrate'
      tests: '["test:integration", "test:unit"]'
  scan-zap:
    uses: digicatapult/shared-workflows/.github/workflows/scan-zap.yml@main
    permissions:
      contents: read
    with:
      docker_name: "ghcr.io/zaproxy/zaproxy:2.17.0"
      docker_compose_file: docker-compose.yml
      env_vars: '{"CLOUDAGENT_ADMIN_ORIGIN": "http://localhost:3100"}'
      pre_scan_command: >
        sudo apt-get update &&
        sudo apt-get install -y libnss3-tools mkcert &&
        mkcert -install &&
        mkcert veritable-cloudagent-alice localhost &&
        mkcert veritable-cloudagent-bob localhost &&
        export NODE_EXTRA_CA_CERTS="$(mkcert -CAROOT)/rootCA.pem" &&
        npm ci &&
        npm run tsoa:build &&
        npm run db:migrate &&
        npm run build &&
        (npm start &)
      target: "http://localhost:3000"
      target_wait_timeout: 120

  build-docker:
    uses: digicatapult/shared-workflows/.github/workflows/build-docker.yml@main
    permissions:
      contents: read
      packages: write
      security-events: write
